# Backend + Postgres only (no npm build). Use when Docker frontend build is slow.
# Run the UI separately: cd frontend && npm run dev  →  http://localhost:5173
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: breathe
      POSTGRES_USER: breathe
      POSTGRES_PASSWORD: breathe
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breathe -d breathe"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: Dockerfile.backend-only
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://breathe:breathe@db:5432/breathe
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
